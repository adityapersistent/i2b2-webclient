name: Docker Image Build Pipeline

on:
  push:
    branches: ['**']

jobs:
  build:
    name: Build i2b2-webclient image
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HOST }}
          password: ${{ secrets.DOCKER_LOGIN_TOKEN }}

      - name: Determine tag
        id: vars
        run: |
          echo "web_tag=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "Using tag: $web_tag"

      - name: Build and Push image
        run: |
          # Fails the script immediately if a command exits with a non-zero status
          set -e 
          
          export WEBCLIENT_TAG="$web_tag"
          export docker_username=${{ secrets.DOCKER_HOST }}
          export docker_reponame=${{ secrets.DOCKER_REPO }}
          
          cd docker/
          bash create_docker_image.sh "$WEBCLIENT_TAG"